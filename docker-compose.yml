version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: clinic-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-clinic_booking}
      POSTGRES_USER: ${DB_USER:-clinic_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeMe!2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clinic_admin} -d ${DB_NAME:-clinic_booking}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # n8n — Workflow Automation Engine
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: clinic-n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-ChangeMe!2026}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${DB_NAME:-clinic_booking}
      - DB_POSTGRESDB_USER=${DB_USER:-clinic_admin}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-ChangeMe!2026}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-your-encryption-key-change-this}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GENERIC_TIMEZONE=${TIMEZONE:-Asia/Kolkata}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # Admin Dashboard API (Node.js)
  # ============================================
  admin-api:
    build:
      context: ./admin-dashboard/api
      dockerfile: Dockerfile
    container_name: clinic-admin-api
    restart: unless-stopped
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://${DB_USER:-clinic_admin}:${DB_PASSWORD:-ChangeMe!2026}@postgres:5432/${DB_NAME:-clinic_booking}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-this}
      - CORS_ORIGIN=${ADMIN_URL:-http://localhost:5173}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # Admin Dashboard Frontend (React + Vite)
  # ============================================
  admin-frontend:
    build:
      context: ./admin-dashboard/frontend
      dockerfile: Dockerfile
    container_name: clinic-admin-ui
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - admin-api

volumes:
  postgres_data:
  n8n_data:
