# ============================================================
# WhatsApp Booking SaaS — Docker Compose (Production)
# ============================================================
# Run: docker compose -f docker-compose.saas.yml up -d

version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: wa_booking_saas
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init-saas.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API Server ───────────────────────────────────
  backend:
    build: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wa_booking_saas
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_POOL_MAX: 20
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      WA_VERIFY_TOKEN: ${WA_VERIFY_TOKEN:-}
      APP_URL: ${APP_URL:-http://localhost:4000}
      FB_APP_ID: ${FB_APP_ID:-}
      FB_APP_SECRET: ${FB_APP_SECRET:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}

  # ── Cron Worker (Reminders + Scheduled Jobs) ─────────────
  cron-worker:
    build: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "src/cron.js"]
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wa_booking_saas
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_URL: ${APP_URL:-http://localhost:4000}

  # ── Tenant Dashboard (Clinic Admin Panel) ───────────────
  tenant-dashboard:
    build:
      context: ./tenant-dashboard
      args:
        VITE_FB_APP_ID: ${FB_APP_ID:-}
        VITE_FB_CONFIG_ID: ${FB_CONFIG_ID:-}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Super Admin Panel (Platform Dashboard) ──────────────
  super-admin:
    build: ./super-admin
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend

  # ── Landing Page (futurezminds.in) ─────────────────────
  website:
    build: ./website
    restart: always
    ports:
      - "3002:80"

volumes:
  pgdata:
