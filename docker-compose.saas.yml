# ============================================================
# WhatsApp Booking SaaS — Docker Compose (Production)
# ============================================================
# Run: docker compose -f docker-compose.saas.yml up -d

version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: wa_booking_saas
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init-saas.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Caching, Rate Limiting, Session Store) ────────
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API Server ───────────────────────────────────
  backend:
    build: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wa_booking_saas
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_POOL_MAX: 20
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-random-string}
      WA_VERIFY_TOKEN: ${WA_VERIFY_TOKEN:-bookingbot-verify-2024}
      APP_URL: ${APP_URL:-https://api.futurezminds.in}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://book.futurezminds.in,https://hub.futurezminds.in,http://localhost:3000,http://localhost:3001}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}

  # ── Cron Worker (Reminders + Scheduled Jobs) ─────────────
  cron-worker:
    build: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "src/cron.js"]
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wa_booking_saas
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-random-string}
      APP_URL: ${APP_URL:-https://yourdomain.com}

  # ── n8n (Optional — for advanced workflow automation) ────
  n8n:
    image: n8nio/n8n:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-admin}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: wa_booking_saas
      DB_POSTGRESDB_USER: ${DB_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-postgres}
      WEBHOOK_URL: ${APP_URL:-http://localhost:5678}
    volumes:
      - n8ndata:/home/node/.n8n

  # ── Admin Frontend (Tenant Dashboard) ───────────────────
  tenant-dashboard:
    build: ./tenant-dashboard
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Super Admin Frontend (Platform Dashboard) ───────────
  super-admin:
    build: ./super-admin
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  n8ndata:
