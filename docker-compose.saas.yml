# ============================================================
# WhatsApp Booking SaaS — Docker Compose (Production)
# ============================================================
# Run: docker compose -f docker-compose.saas.yml up -d

version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: wa_booking_saas
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init-saas.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Caching, Rate Limiting, Session Store) ────────
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API Server ───────────────────────────────────
  backend:
    build: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wa_booking_saas
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_POOL_MAX: 20
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      WA_VERIFY_TOKEN: ${WA_VERIFY_TOKEN:-}
      APP_URL: ${APP_URL:-http://localhost:4000}
      CORS_ORIGINS: ${CORS_ORIGINS:-}

  # ── Cron Worker (Reminders + Scheduled Jobs) ─────────────
  cron-worker:
    build: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "src/cron.js"]
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wa_booking_saas
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_URL: ${APP_URL:-http://localhost:4000}

  # ── Admin Frontend (Tenant Dashboard) ───────────────────
  tenant-dashboard:
    build: ./tenant-dashboard
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Super Admin Frontend (Platform Dashboard) ───────────
  super-admin:
    build: ./super-admin
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
